# Skapa Final Workflow Feature Development Across Screens And Components

## Action

Follow the feature-development-across-screens-and-components workflow:
1. Edit or create components in src/components/
2. Edit or create screens in src/screens/ and subfolders
3. Update navigation in src/navigation/MainNavigator.tsx
4. Update theming in src/theme/index.ts
5. Optionally update documentation in memory/PRD.md

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/components/*.tsx, src/screens/**/*.tsx, src/navigation/MainNavigator.tsx

