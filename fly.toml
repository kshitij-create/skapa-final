# Fly.io configuration for SKAPA backend
app = "skapa-backend"
primary_region = "sin"  # Singapore (change to your preferred region)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8001"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  
  # Support WebSocket connections
  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Health check
[[services]]
  http_checks = []
  internal_port = 8001
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 250
    soft_limit = 200
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    restart_limit = 0
    timeout = "5s"

  [[services.http_checks]]
    interval = "30s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"
    tls_skip_verify = false

# VM resources
[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
